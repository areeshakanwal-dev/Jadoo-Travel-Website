<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadoo - Travel Website</title>
    <link rel="stylesheet" href="jado.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:italic,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- TOP MENU BAR -->
        <div class="navbar">
            <div class="logo">
                Jad
                <svg class="oo-svg" viewBox="0 0 90 50" width="90" height="50">
                    <!-- Black "oo" text -->
                    <text x="2" y="38" font-family="Roboto" font-size="36px" font-weight="800" fill="black">
                        oo
                    </text>
                    <!-- Yellow circles inside the holes -->
                    <ellipse cx="12" cy="28" rx="4" ry="6" fill="#FFA500" />
                    <ellipse cx="32" cy="28" rx="4" ry="6" fill="#FFA500" />
                </svg>
            </div>
            <div class="nav-links">
                <a href="#">Destinations</a>
                <a href="#">Hotels</a>
                <a href="#">Flights</a>
                <a href="#">Bookings</a>
            </div>
            <div class="buttons">
                <button class="login">Login</button>
                <button class="signup">Sign up</button>
                <button class="language">EN <i class="fas fa-chevron-down"></i></button>
            </div>
        </div>

        <!-- MAIN CONTENT SECTION -->
        <div class="main-content">
            <!-- LEFT SIDE - TEXT -->
            <div class="text-side">
                <div class="badge">BEST DESTINATIONS AROUND THE WORLD</div>
                <h1 class="hero-section" >Travel, enjoy <br> and live a new <br> <span class="orange">and full life</span></h1>
                <p class="description">
                    Built Wicket longer admire do barton vanity itself do in it.<br>
                    Preferred to sportsmen it engrossed listening. Park gate<br>
                    sell they west hard for the.
                </p>
                <div class="buttons-group">
                    <button class="find-btn">Find out more</button>
                    <div class="play-btn">
                        <div class="play-icon">▶</div>
                        <span>Play Demo</span>
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDE - PICTURE -->
            <div class="image-side">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxlwMZCCHgxtq1XSRfdEeUrp1VFAX-nAUv20NOr0c5Cw&s=10" alt="Traveler girl"
                    class="traveler-img">
            </div>
        </div>
    </div>
    <script>
        // This makes buttons work when clicked
        document.querySelector('.find-btn').onclick = function () {
            alert('✨ Find out more about amazing destinations!');
        }
        document.querySelector('.play-btn').onclick = function () {
            alert('▶️ Watch our travel demo video!');
        }
        document.querySelector('.login').onclick = function () {
            alert('🔐 Login to your account');
        }
        document.querySelector('.signup').onclick = function () {
            alert('📝 Create a new account');
        }
        document.querySelector('.language').onclick = function () {
            alert('🌐 Change language');
        }
    </script>
</body>

</html>
